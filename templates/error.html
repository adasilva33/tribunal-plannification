{% extends 'base.html' %}
{% block title %}Erreur {{ code }}{% endblock %}
{% block content %}
<div class="card" style="text-align:center;padding:4rem;max-width:500px;margin:4rem auto">
  <div style="font-size:4rem;margin-bottom:1rem">{{ '🔒' if code == 403 else '🔍' }}</div>
  <h1 style="font-size:2rem;color:#0d2950">{{ code }}</h1>
  <p style="color:#546e7a;margin-top:.5rem">{{ message }}</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary" style="margin-top:1.5rem">Retour à l'accueil</a>
</div>
{% endblock %}
